<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Distance Converter</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#eef2f7;
    }

    /* HEADER */
    .header{
      background:#0f2e63;
      color:white;
      padding:15px;
      font-size:18px;
      display:flex;
      align-items:center;
    }
    .header span{
      cursor:pointer;
      margin-right:15px;
      font-size:22px;
    }

    /* CONTAINER */
    .container{
      padding:15px;
    }

    /* INPUT */
    .input-group{
      display:flex;
      margin:15px 0;
    }

    .input-group input{
      flex:1;
      padding:10px;
      border:2px solid #0f2e63;
      border-radius:8px 0 0 8px;
      outline:none;
      font-size:16px;
    }

    .unit-box{
      width:70px;
      background:#0f2e63;
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:0 8px 8px 0;
      font-weight:bold;
    }

    /* TABLE */
    .table{
      background:white;
      border-radius:10px;
      overflow:hidden;
      margin-top:15px;
    }

    .table-header{
      background:#0f2e63;
      color:white;
      padding:12px;
      font-weight:bold;
    }

    .table-row{
      display:flex;
      justify-content:space-between;
      padding:12px;
      border-bottom:1px solid #ddd;
      font-size:15px;
    }
  </style>
</head>

<body>

<div class="header">
  <span onclick="history.back()">←</span>
  Distance Converter
</div>

<div class="container">

  <!-- INPUT (Meters only) -->
  <div class="input-group">
    <input type="number" id="distanceInput" value="1" oninput="convertDistance()">
    <div class="unit-box">m</div>
  </div>

  <!-- RESULT TABLE -->
  <div class="table">
    <div class="table-header">Conversion Value</div>

    <div class="table-row"><span>Millimeter</span><span id="mm"></span></div>
    <div class="table-row"><span>Centimeter</span><span id="cm"></span></div>
    <div class="table-row"><span>Decimeter</span><span id="dm"></span></div>
    <div class="table-row"><span>Meter</span><span id="m"></span></div>
    <div class="table-row"><span>Kilometer</span><span id="km"></span></div>
    <div class="table-row"><span>Foot</span><span id="ft"></span></div>
    <div class="table-row"><span>Yard</span><span id="yard"></span></div>
    <div class="table-row"><span>Inch</span><span id="inch"></span></div>
    <div class="table-row"><span>Mile</span><span id="mile"></span></div>
    <div class="table-row"><span>Nautical Mile</span><span id="nautical"></span></div>
  </div>

</div>

<script>

  function convertDistance(){

    let meters=parseFloat(document.getElementById("distanceInput").value);

    if(isNaN(meters)){
      document.querySelectorAll(".table-row span:last-child")
      .forEach(e=>e.innerText="0");
      return;
    }

    document.getElementById("mm").innerText=(meters*1000).toFixed(3)+" mm";
    document.getElementById("cm").innerText=(meters*100).toFixed(3)+" cm";
    document.getElementById("dm").innerText=(meters*10).toFixed(3)+" dm";
    document.getElementById("m").innerText=(meters).toFixed(3)+" m";
    document.getElementById("km").innerText=(meters/1000).toFixed(5)+" km";
    document.getElementById("ft").innerText=(meters*3.28084).toFixed(3)+" ft";
    document.getElementById("yard").innerText=(meters*1.09361).toFixed(3)+" yd";
    document.getElementById("inch").innerText=(meters*39.3701).toFixed(3)+" inch";
    document.getElementById("mile").innerText=(meters*0.000621371).toFixed(6)+" mile";
    document.getElementById("nautical").innerText=(meters*0.000539957).toFixed(6)+" NM";
  }

  convertDistance(); // default load

</script>

</body>
</html>
