<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculation of Helix Bar</title>
  <link rel="stylesheet" href="../style.css" />
</head>

<body class="page-calculator helix-page">

  <!-- ===== TOP BAR ===== -->
  <header class="top-bar helix-header">
    <a class='back-btn' href='../index.html'>←</a>
    <h1>Calculation of Helix Bar</h1>
    <span class="edit-icon">✏️</span>
  </header>

  <main class="helix-container">

    <!-- ===== TYPE CARD ===== -->
    <div class="calc-type-card">
      <img src="../icons/helix.html" alt="Helix Bar">
      <p>Helix Bar</p>
    </div>

    <!-- ===== INPUT FORM ===== -->
    <div class="calc-form">

      <div class="input-row">
        <label>Height H</label>
        <div class="input-wrap">
          <input type="number" value="0">
          <span>m</span>
        </div>
      </div>

      <div class="input-row">
        <label>Diameter d</label>
        <div class="input-wrap">
          <input type="number" value="0">
          <span>m</span>
        </div>
      </div>

      <div class="input-row">
        <label>Pitch p</label>
        <div class="input-wrap">
          <input type="number" value="0">
          <span>m</span>
        </div>
      </div>

    </div>

    <!-- ===== DIVIDER LINE ===== -->
    <div class="thick-divider"></div>

    <!-- ===== ACTION BUTTONS ===== -->
    <div class="action-buttons">
      <button class="btn ghost">📤 Share</button>
      <button class="btn primary">🧮 Calculate</button>
      <button class="btn ghost">🔄 Reset</button>
    </div>

    <!-- ===== YOUTUBE BANNER ===== -->
    <div class="yt-banner">
      Subscribe our Youtube Channel ▶
      <strong>Civil Engineering Tech</strong>
    </div>

    <!-- ===== LIGHT DIVIDER ===== -->
    <div class="light-divider"></div>

    <!-- ===== RESULT TABLE ===== -->
    <div class="result-table">

      <div class="result-header">
        <span>Material</span>
        <span>Quantity</span>
        <span>Unit</span>
      </div>

      <div class="result-row">
        <span>Helix Cutting Length</span>
        <span>0</span>
        <span>cm</span>
      </div>

    </div>

  </main>

</body>
