<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Round Column Concrete</title>
    <link rel="stylesheet" href="../style.css" />
</head>

<body class="page-calculator concrete-ui">

<header class="top-bar">
    <a class="back-btn" href="concrete.html">←</a>
    <h1>Calculation of Round Column Concrete</h1>
    <div class="top-icon">🛠️</div>
</header>

<main class="main-content">

    <div class="title-card">
        <span class="title-icon">⚪</span>
        <span class="title-text">Round Column Concrete</span>
    </div>

    <!-- INPUTS -->
    <div class="form-card">
        <label class="section-label">Column Dimensions</label>

        <div class="input-with-unit">
            <input type="number" id="diameter" value="0.5" />
            <span class="unit-box">m</span>
        </div>

        <div class="input-with-unit" style="margin-top:12px">
            <input type="number" id="height" value="3" />
            <span class="unit-box">m</span>
        </div>
    </div>

    <div class="divider"></div>

    <!-- RATIO -->
    <div class="form-card">
        <label class="section-label">Concrete Ratio</label>

        <div class="ratio-grid">
            <div class="ratio-box">
                <label>Cement</label>
                <input type="number" id="cementRatio" value="1" />
            </div>

            <div class="ratio-box">
                <label>Sand</label>
                <input type="number" id="sandRatio" value="2" />
            </div>

            <div class="ratio-box">
                <label>Aggregate</label>
                <input type="number" id="aggRatio" value="4" />
            </div>
        </div>

        <div class="two-col">
            <div>
                <label>Dry Volume Factor</label>
                <input type="number" id="dryFactor" value="1.54" />
            </div>

            <div>
                <label>Water Cement Ratio</label>
                <input type="number" id="waterRatio" value="0.5" />
            </div>
        </div>
    </div>

    <div class="divider"></div>

    <!-- BUTTONS -->
    <div class="action-row">
        <button class="btn primary" onclick="calculateRound()">🧮 Calculate</button>
        <button class="btn light" onclick="resetResults()">🔄 Reset</button>
    </div>

    <!-- RESULTS -->
    <div class="result-card">
        <div class="result-header">
            <span>Material</span>
            <span>Quantity</span>
            <span>Unit</span>
        </div>
        <div id="resultRows"></div>
    </div>

</main>

<!-- UNIT SWITCHER -->
<div class="unit-switcher">
    <button class="active" onclick="setUnit('m', this)">meter</button>
    <button onclick="setUnit('ft', this)">foot</button>
    <button onclick="setUnit('yd', this)">yard</button>
    <button onclick="setUnit('brass', this)">brass</button>
</div>

<script src="concrete.js"></script>
</body>
</html>
