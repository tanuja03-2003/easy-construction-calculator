<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Calculation of Back Filling</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../style.css" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      overflow-y: auto;
    }

    /* ===== CLEAN HEADER (NO CONFLICT) ===== */
    .custom-header {
      background: #0f2f4f;
      color: white;
      display: flex;
      align-items: center;
      padding: 15px;
    }

    .custom-header span {
      font-size: 18px;
      cursor: pointer;
      margin-right: 12px;
    }

    .custom-header h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
      color: white;
    }

    .container {
      padding: 20px;
      padding-bottom: 140px; /* space for unit switcher */
    }

    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
      background: white;
    }

    table th {
      background: #0f2f4f;
      color: white;
      padding: 10px;
    }

    table td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #eee;
    }
  </style>
</head>

<body>

<!-- ✅ NEW SAFE HEADER -->
<div class="custom-header">
  <span onclick="history.back()">←</span>
  <h2>Calculation of Back Filling</h2>
</div>

<div class="container">

  <h4>Dimensions of Ground :</h4>

  <div class="input-group">
    <label>Length L</label>
    <input type="number" id="length" value="5">
    <span class="unit-box">m</span>
  </div>

  <div class="input-group">
    <label>Width W</label>
    <input type="number" id="width" value="5">
    <span class="unit-box">m</span>
  </div>

  <div class="input-group">
    <label>Depth D</label>
    <input type="number" id="depth" value="5">
    <span class="unit-box">m</span>
  </div>

  <hr>

  <h4>Excavation Quantity and Trip Volume :</h4>

  <div class="row-2">
    <div>
      <label>1 Trip Volume</label>
      <input type="number" id="tripVolume" value="50">
      <span class="unit-box">m³</span>
    </div>

    <div>
      <label>Excavation Price</label>
      <input type="number" id="price" value="0">
      <span class="unit-box">₹/m³</span>
    </div>
  </div>

  <div class="input-group full">
    <label>Quantity</label>
    <input type="number" id="quantity" value="1">
  </div>

  <div class="btn-row">
    <button onclick="calculate()">Calculate</button>
    <button onclick="resetForm()">Reset</button>
  </div>

  <!-- RESULT TABLE -->
  <table>
    <thead>
    <tr>
      <th>Material</th>
      <th>Quantity</th>
      <th>Unit</th>
    </tr>
    </thead>
    <tbody>
    <tr>
      <td>Volume</td>
      <td id="resultVolume">0</td>
      <td id="unitLabel">m³</td>
    </tr>
    <tr>
      <td>Total Trips</td>
      <td id="resultTrips">0</td>
      <td>trips</td>
    </tr>
    <tr>
      <td>Total Cost</td>
      <td id="resultCost">0</td>
      <td>₹</td>
    </tr>
    </tbody>
  </table>

</div>

<div class="unit-switcher">
  <button onclick="changeUnit('meter')">meter</button>
  <button onclick="changeUnit('foot')">foot</button>
  <button onclick="changeUnit('yard')">yard</button>
  <button onclick="changeUnit('brass')">brass</button>
</div>

<script src="backfilling.js"></script>

</body>
</html>
