<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Square Column Concrete</title>
  <link rel="stylesheet" href="../style.css" />
</head>

<body class="page-calculator concrete-ui">

<!-- ===== TOP BAR ===== -->
<header class="top-bar">
  <a class="back-btn" href="concrete.html">←</a>
  <h1>Calculation of Square Column</h1>
  <div class="top-icon">🛠️</div>
</header>

<main class="main-content">

  <!-- ===== TITLE CARD ===== -->
  <div class="title-card">
    <span class="title-icon">⬛</span>
    <span class="title-text">Square Column Concrete</span>
  </div>

  <!-- ===== COLUMN INPUTS ===== -->
  <div class="form-card">
    <label class="section-label">Column Dimensions</label>

    <div class="two-col">
      <div>
        <label>Side a</label>
        <input type="number" id="sideA" value="0.5">
      </div>

      <div>
        <label>Side b</label>
        <input type="number" id="sideB" value="0.5">
      </div>
    </div>

    <div class="input-with-unit" style="margin-top:12px">
      <input type="number" id="height" value="3">
      <span class="unit-box" id="dimUnit">m</span>
    </div>
  </div>

  <div class="divider"></div>

  <!-- ===== CONCRETE RATIO ===== -->
  <div class="form-card">
    <label class="section-label">Concrete Ratio</label>

    <div class="ratio-grid">
      <div class="ratio-box">
        <label>Cement</label>
        <input type="number" value="1">
      </div>

      <div class="ratio-box">
        <label>Sand</label>
        <input type="number" value="2">
      </div>

      <div class="ratio-box">
        <label>Aggregate</label>
        <input type="number" value="4">
      </div>
    </div>

    <div class="two-col">
      <div>
        <label>Dry Volume Factor</label>
        <input type="number" value="1.54">
      </div>

      <div>
        <label>Water Cement Ratio</label>
        <input type="number" value="0.5">
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- ===== ACTION BUTTONS ===== -->
  <div class="action-row">
    <button class="btn light">📤 Share</button>
    <button class="btn primary" onclick="calculateSquareColumn()">🧮 Calculate</button>
    <button class="btn light" onclick="resetResults()">🔄 Reset</button>
  </div>

  <!-- ===== RESULTS ===== -->
  <div class="result-card">
    <div class="result-header">
      <span>⬇ Material</span>
      <span>Quantity</span>
      <span>Unit</span>
    </div>
    <div id="resultRows"></div>
  </div>

</main>

<!-- ===== UNIT SWITCHER ===== -->
<div class="unit-switcher">
  <button onclick="setUnit('m')">meter</button>
  <button onclick="setUnit('ft')">foot</button>
  <button onclick="setUnit('yd')">yard</button>
  <button onclick="setUnit('brass')">brass</button>
</div>

<!-- ===== JS ===== -->
<script src="concrete.js"></script>

<script>
  function calculateSquareColumn() {
    const a = parseFloat(document.getElementById("sideA").value) || 0;
    const b = parseFloat(document.getElementById("sideB").value) || 0;
    const h = parseFloat(document.getElementById("height").value) || 0;

    // Base volume always in m³
    baseVolumeM3 = a * b * h;
    updateResults();
  }

  // Auto calculate once on load
  window.onload = calculateSquareColumn;
</script>

</body>
</html>
