<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculation of Super Elevation</title>
  <link rel="stylesheet" href="../style.css" />
</head>

<body class="page-calculator superelevation-page">

  <!-- ===== TOP BAR ===== -->
  <header class="top-bar superelevation-header">
    <a class='back-btn' href='../index.html'>←</a>
    <h1>Calculation of Super Elevation</h1>
    <span class="edit-icon">✏️</span>
  </header>

  <main class="superelevation-container">

    <!-- ===== INPUTS ===== -->
    <div class="calc-form">

      <div class="input-row">
        <label>Vehicle Speed</label>
        <div class="input-wrap">
          <input type="number" value="0">
          <span>km/hour</span>
        </div>
      </div>

      <div class="input-row">
        <label>Width of Road</label>
        <div class="input-wrap">
          <input type="number" value="0">
          <span>meter</span>
        </div>
      </div>

      <div class="input-row">
        <label>Road Radius</label>
        <div class="input-wrap">
          <input type="number" value="0">
          <span>meter</span>
        </div>
      </div>

      <div class="input-row">
        <label>Acceleration</label>
        <div class="input-wrap">
          <input type="number" value="9.8">
          <span>meter/sec²</span>
        </div>
      </div>

    </div>

    <!-- ===== THICK DIVIDER ===== -->
    <div class="thick-divider"></div>

    <!-- ===== BUTTONS ===== -->
    <div class="action-buttons">
      <button class="btn ghost">📤 Share</button>
      <button class="btn primary">🧮 Calculate</button>
      <button class="btn ghost">🔄 Reset</button>
    </div>

    <!-- ===== YOUTUBE BANNER ===== -->
    <div class="yt-banner">
      Subscribe our Youtube Channel ▶
      <strong>Civil Engineering Tech</strong>
    </div>

    <!-- ===== LIGHT DIVIDER ===== -->
    <div class="light-divider"></div>

    <!-- ===== RESULT TABLE ===== -->
    <div class="result-table">

      <div class="result-header">
        <span>Material</span>
        <span>Quantity</span>
        <span>Unit</span>
      </div>

      <div class="result-row">
        <span>Super Elevation h</span>
        <span>0</span>
        <span>cm</span>
      </div>

    </div>

  </main>

</body>
