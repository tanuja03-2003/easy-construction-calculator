<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Volume</title>

  <style>
    /* ================= RESET ================= */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    body {
      background: #f6f8fc;
      color: #0b2a4a;
    }

    a { text-decoration: none; color: inherit; }

    /* ================= TOP BAR ================= */
    .top-bar {
      background: linear-gradient(135deg, #0b1d33, #123a63);
      color: white;
      padding: 14px 18px;
      font-size: 18px;
      font-weight: 600;
    }

    /* ================= TABS ================= */
    .tabs {
      display: flex;
      gap: 22px;
      padding: 10px 18px;
      background: #0f3a5f;
    }

    .tabs a {
      font-size: 13px;
      color: #cfd8e3;
      padding-bottom: 6px;
    }

    .tabs a.active {
      color: #ffb703;
      border-bottom: 3px solid #ffb703;
    }

    /* ================= LAYOUT ================= */
    .app-layout {
      display: flex;
      min-height: calc(100vh - 94px);
    }

    .sidebar {
      width: 220px;
      background: linear-gradient(180deg, #0b2540, #081b30);
      padding: 18px 0;
    }

    .sidebar a {
      display: block;
      padding: 14px 22px;
      color: #e2e8f0;
    }

    .sidebar a:hover,
    .sidebar a.active {
      background: rgba(255,255,255,0.08);
    }

    .main-content {
      flex: 1;
      padding: 22px;
    }

    /* ================= GRID ================= */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    /* ================= CARD ================= */
    .card {
      background: #eaf7f2;          /* light mint like reference */
      border-radius: 16px;
      padding: 22px 12px;
      text-align: center;
      box-shadow: 0 6px 16px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      aspect-ratio: 1 / 1;
    }

    .label {
      font-size: 13px;
      font-weight: 600;
      color: #0f766e;
      margin-top: 10px;
    }

    /* ================= SHAPES ================= */

    .shape {
      width: 80px;
      height: 80px;
    }

    .rect-prism {
      background: #c4b5fd;
      border: 3px solid #0b2a4a;
      transform: skew(-10deg);
    }

    .cylinder {
      background: #a3d635;
      border-radius: 50%;
      position: relative;
    }

    .cylinder::after {
      content: "";
      position: absolute;
      bottom: -12px;
      left: 0;
      width: 100%;
      height: 24px;
      background: #a3d635;
      border-radius: 50%;
      border: 3px solid #0b2a4a;
    }

    .rect-tank {
      background: #f87171;
      border: 3px dashed #0b2a4a;
    }

    .sphere {
      background: #facc15;
      border-radius: 50%;
      box-shadow: inset -10px -10px 0 rgba(0,0,0,0.15);
    }

    .cube {
      background: #93c5fd;
      border: 3px solid #0b2a4a;
    }

    .half-sphere {
      width: 80px;
      height: 40px;
      background: #34d399;
      border-radius: 80px 80px 0 0;
      border: 3px solid #0b2a4a;
      border-bottom: none;
    }

    /* ================= MOBILE ================= */
    @media (max-width: 768px) {
      .sidebar { display: none; }

      .cards-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
      }

      .shape {
        width: 70px;
        height: 70px;
      }
    }
  </style>
</head>

<body>

<div class="top-bar">Easy Construction Calculator</div>

<nav class="tabs">
  <a href="../index.html">QUANTITY</a>
  <a href="rcc.html">RCC</a>
  <a href="area.html">AREA</a>
  <a class="active" href="volume.html">VOLUME</a>
  <a href="conversion.html">CONVERSION</a>
</nav>

<div class="app-layout">

  <aside class="sidebar">
    <a href="../index.html">📐 Calculator</a>
    <a href="../mcq/index.html">📘 MCQ</a>
    <a href="../notes/index.html">📝 Notes</a>
    <a href="../help/index.html">❓ Help</a>
  </aside>

  <main class="main-content">
    <section class="cards-grid">

      <a class="card">
        <div class="shape rect-prism"></div>
        <div class="label">Rectangle Prism</div>
      </a>

      <a class="card">
        <div class="shape cylinder"></div>
        <div class="label">Cylinder</div>
      </a>

      <a class="card">
        <div class="shape rect-tank"></div>
        <div class="label">Rectangle Tank</div>
      </a>

      <a class="card">
        <div class="shape sphere"></div>
        <div class="label">Sphere</div>
      </a>

      <a class="card">
        <div class="shape cube"></div>
        <div class="label">Cube</div>
      </a>

      <a class="card">
        <div class="half-sphere"></div>
        <div class="label">Half Sphere</div>
      </a>

    </section>
  </main>

</div>

</body>
</html>
