<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Area</title>

  <style>
    /* ================= RESET ================= */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    body {
      background: #f4f7fb;
      color: #0b2a4a;
    }

    a { text-decoration: none; color: inherit; }

    /* ================= TOP ================= */
    .top-bar {
      background: linear-gradient(135deg, #0b1d33, #123a63);
      color: #fff;
      padding: 14px 18px;
      font-size: 18px;
      font-weight: 600;
    }

    .tabs {
      display: flex;
      gap: 22px;
      padding: 10px 18px;
      background: #0f3a5f;
    }

    .tabs a {
      font-size: 13px;
      color: #cfd8e3;
      padding-bottom: 6px;
    }

    .tabs a.active {
      color: #ffb703;
      border-bottom: 3px solid #ffb703;
    }

    /* ================= LAYOUT ================= */
    .app-layout {
      display: flex;
      min-height: calc(100vh - 94px);
    }

    .sidebar {
      width: 220px;
      background: linear-gradient(180deg, #0b2540, #081b30);
      padding: 18px 0;
    }

    .sidebar a {
      display: block;
      padding: 14px 22px;
      color: #e2e8f0;
    }

    .sidebar a:hover,
    .sidebar a.active {
      background: rgba(255,255,255,0.08);
    }

    .main-content {
      flex: 1;
      padding: 22px;
    }

    /* ================= GRID ================= */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    /* ================= CARD ================= */
    .card {
      background: #ffffff;
      border-radius: 18px;
      padding: 22px 12px;
      text-align: center;
      box-shadow: 0 6px 16px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      aspect-ratio: 1 / 1;
    }

    .shape {
      width: 70px;
      height: 70px;
      margin-bottom: 12px;
    }

    .label {
      font-size: 13px;
      font-weight: 600;
      color: #2563eb;
    }

    /* ================= SHAPES ================= */

    .circle {
      border-radius: 50%;
      background: #fde047;
      border: 3px solid #0b2a4a;
    }

    .square {
      background: #4fd1c5;
      border: 3px solid #0b2a4a;
    }

    .rectangle {
      width: 80px;
      height: 50px;
      background: #f97316;
      border: 3px solid #0b2a4a;
    }

    .triangle {
      width: 0;
      height: 0;
      border-left: 35px solid transparent;
      border-right: 35px solid transparent;
      border-bottom: 60px solid #94a3b8;
    }

    .trapezoid {
      width: 80px;
      height: 0;
      border-bottom: 50px solid #a78bfa;
      border-left: 16px solid transparent;
      border-right: 16px solid transparent;
    }

    .ellipse {
      width: 80px;
      height: 50px;
      background: #93c5fd;
      border-radius: 50%;
      border: 3px solid #2563eb;
    }

    /* ================= MOBILE ================= */
    @media (max-width: 768px) {
      .sidebar { display: none; }

      .cards-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 14px;
      }

      .shape {
        width: 64px;
        height: 64px;
      }
    }
  </style>
</head>

<body>

<div class="top-bar">Easy Construction Calculator</div>

<nav class="tabs">
  <a href="../index.html">QUANTITY</a>
  <a href="rcc.html">RCC</a>
  <a class="active" href="area.html">AREA</a>
  <a href="volume.html">VOLUME</a>
  <a href="conversion.html">CONVERSION</a>
</nav>

<div class="app-layout">

  <aside class="sidebar">
    <a href="../index.html">📐 Calculator</a>
    <a href="../mcq/index.html">📘 MCQ</a>
    <a href="../notes/index.html">📝 Notes</a>
    <a href="../help/index.html">❓ Help</a>
  </aside>

  <main class="main-content">
    <section class="cards-grid">

      <a class="card"><div class="shape circle"></div><div class="label">Circle</div></a>
      <a class="card"><div class="shape square"></div><div class="label">Square</div></a>
      <a class="card"><div class="shape rectangle"></div><div class="label">Rectangle</div></a>
      <a class="card"><div class="shape triangle"></div><div class="label">Triangle</div></a>
      <a class="card"><div class="shape trapezoid"></div><div class="label">Trapezoid</div></a>
      <a class="card"><div class="shape ellipse"></div><div class="label">Ellipse</div></a>

    </section>
  </main>

</div>

</body>
</html>
