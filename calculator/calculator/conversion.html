<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conversion</title>

  <!-- Font Awesome -->
  <link
          rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

  <style>
    /* ========== RESET ========== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, sans-serif;
    }

    body {
      background: #f4f7fb;
    }

    /* ========== TOP BAR ========== */
    .top-bar {
      background: linear-gradient(180deg, #0c2d48, #123b63);
      color: #fff;
      padding: 14px 20px;
      font-size: 18px;
      font-weight: 600;
    }

    /* ========== TABS ========== */
    .tabs {
      display: flex;
      gap: 22px;
      padding: 10px 18px;
      background: #0f3a5f;
    }

    .tabs a {
      color: #cfd8e3;
      text-decoration: none;
      font-size: 14px;
      padding-bottom: 6px;
      font-weight: 600;
    }

    .tabs a.active {
      color: #ffb703;
      border-bottom: 3px solid #ffb703;
    }

    /* ========== LAYOUT ========== */
    .app-layout {
      display: flex;
      min-height: calc(100vh - 92px);
    }

    /* ========== SIDEBAR ========== */
    .sidebar {
      width: 220px;
      background: linear-gradient(180deg, #0b2540, #081b30);
      padding: 20px 0;
    }

    .sidebar a {
      display: block;
      padding: 14px 24px;
      color: #e2e8f0;
      text-decoration: none;
      font-size: 15px;
    }

    .sidebar a:hover,
    .sidebar a.active {
      background: rgba(255,255,255,0.08);
    }

    /* ========== MAIN CONTENT ========== */
    .main-content {
      flex: 1;
      padding: 18px;
    }

    /* ========== GRID (3 PER ROW) ========== */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    /* ========== CARD ========== */
    .card {
      background: #ffffff;              /* ✅ white (no green) */
      border-radius: 18px;
      padding: 22px 12px;
      height: 140px;                    /* ✅ uniform height */
      text-align: center;
      text-decoration: none;
      color: #0f3a5f;
      box-shadow: 0 8px 18px rgba(0,0,0,0.08);

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      transition: transform 0.2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
    }

    /* ICON SIZE */
    .card i {
      font-size: 42px;                  /* ✅ large icons */
      margin-bottom: 10px;
      color: #0ea5a4;
    }

    .card p {
      font-size: 13.5px;
      font-weight: 600;
    }

    /* ========== MOBILE ========== */
    @media (max-width: 900px) {
      .sidebar {
        display: none;
      }
    }
  </style>
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">Easy Construction Calculator</div>

<!-- TABS -->
<nav class="tabs">
  <a href="../index.html">QUANTITY</a>
  <a href="rcc.html">RCC</a>
  <a href="area.html">AREA</a>
  <a href="volume.html">VOLUME</a>
  <a class="active" href="conversion.html">CONVERSION</a>
</nav>

<div class="app-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <a href="../index.html">📐 Calculator</a>
    <a href="../mcq/index.html">📘 MCQ</a>
    <a href="../notes/index.html">📝 Notes</a>
    <a href="../help/index.html">❓ Help</a>
  </aside>

  <!-- MAIN -->
  <main class="main-content">
    <section class="cards-grid">

      <a class="card" href="#">
        <i class="fa-solid fa-ruler-combined"></i>
        <p>Length</p>
      </a>

      <a class="card" href="#">
        <i class="fa-solid fa-weight-scale"></i>
        <p>Weight</p>
      </a>

      <a class="card" href="#">
        <i class="fa-solid fa-stopwatch"></i>
        <p>Time</p>
      </a>

      <a class="card" href="#">
        <i class="fa-solid fa-gauge-high"></i>
        <p>Pressure</p>
      </a>

      <a class="card" href="#">
        <i class="fa-solid fa-tachometer-alt"></i>
        <p>Speed</p>
      </a>

      <a class="card" href="#">
        <i class="fa-solid fa-wave-square"></i>
        <p>Frequency</p>
      </a>

    </section>
  </main>

</div>

</body>
</html>
