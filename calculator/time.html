<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Converter</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#eef2f7;
    }

    /* HEADER */
    .header{
      background:#0f2e63;
      color:white;
      padding:15px;
      font-size:18px;
      display:flex;
      align-items:center;
    }
    .header span{
      cursor:pointer;
      margin-right:15px;
      font-size:22px;
    }

    /* CONTAINER */
    .container{
      padding:15px;
    }

    /* INPUT */
    .input-group{
      display:flex;
      margin:15px 0;
    }

    .input-group input{
      flex:1;
      padding:10px;
      border:2px solid #0f2e63;
      border-radius:8px 0 0 8px;
      outline:none;
      font-size:16px;
    }

    .unit-box{
      width:80px;
      background:#0f2e63;
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:0 8px 8px 0;
      font-weight:bold;
    }

    /* TABLE */
    .table{
      background:white;
      border-radius:10px;
      overflow:hidden;
      margin-top:15px;
    }

    .table-header{
      background:#0f2e63;
      color:white;
      padding:12px;
      font-weight:bold;
    }

    .table-row{
      display:flex;
      justify-content:space-between;
      padding:12px;
      border-bottom:1px solid #ddd;
      font-size:15px;
    }
  </style>
</head>

<body>

<div class="header">
  <span onclick="history.back()">←</span>
  Time Converter
</div>

<div class="container">

  <!-- INPUT -->
  <div class="input-group">
    <input type="number" id="timeInput" value="1" oninput="convertTime()">
    <div class="unit-box">day</div>
  </div>

  <!-- RESULT TABLE -->
  <div class="table">
    <div class="table-header">Conversion Value</div>

    <div class="table-row"><span>Second</span><span id="sec"></span></div>
    <div class="table-row"><span>Minute</span><span id="min"></span></div>
    <div class="table-row"><span>Hour</span><span id="hour"></span></div>
    <div class="table-row"><span>Day</span><span id="day"></span></div>
    <div class="table-row"><span>Week</span><span id="week"></span></div>
    <div class="table-row"><span>Month</span><span id="month"></span></div>
    <div class="table-row"><span>Year</span><span id="year"></span></div>
    <div class="table-row"><span>Millisecond</span><span id="ms"></span></div>
  </div>

</div>

<script>

  function convertTime(){

    let value = parseFloat(document.getElementById("timeInput").value);

    if(isNaN(value)){
      document.querySelectorAll(".table-row span:last-child")
      .forEach(e=>e.innerText="0");
      return;
    }

    // Base = days
    let days = value;

    let seconds = days * 86400;
    let minutes = days * 1440;
    let hours = days * 24;
    let weeks = days / 7;
    let months = days / 30.44;     // average month
    let years = days / 365.25;     // leap year avg
    let milliseconds = seconds * 1000;

    document.getElementById("sec").innerText = seconds.toFixed(2);
    document.getElementById("min").innerText = minutes.toFixed(2);
    document.getElementById("hour").innerText = hours.toFixed(2);
    document.getElementById("day").innerText = days.toFixed(2);
    document.getElementById("week").innerText = weeks.toFixed(5);
    document.getElementById("month").innerText = months.toFixed(5);
    document.getElementById("year").innerText = years.toFixed(5);
    document.getElementById("ms").innerText = milliseconds.toFixed(2);

  }

  convertTime(); // load default

</script>

</body>
</html>
