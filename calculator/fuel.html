<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fuel Converter</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#eef2f7;
    }

    /* HEADER */
    .header{
      background:#0f2e63;
      color:white;
      padding:15px;
      font-size:18px;
      display:flex;
      align-items:center;
    }
    .header span{
      cursor:pointer;
      margin-right:15px;
      font-size:22px;
    }

    /* CONTAINER */
    .container{
      padding:15px;
    }

    /* INPUT */
    .input-group{
      display:flex;
      margin:15px 0;
    }

    .input-group input{
      flex:1;
      padding:10px;
      border:2px solid #0f2e63;
      border-radius:8px 0 0 8px;
      outline:none;
      font-size:16px;
    }

    .unit-box{
      width:80px;
      background:#0f2e63;
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:0 8px 8px 0;
      font-weight:bold;
    }

    /* TABLE */
    .table{
      background:white;
      border-radius:10px;
      overflow:hidden;
      margin-top:15px;
    }

    .table-header{
      background:#0f2e63;
      color:white;
      padding:12px;
      font-weight:bold;
    }

    .table-row{
      display:flex;
      justify-content:space-between;
      padding:12px;
      border-bottom:1px solid #ddd;
      font-size:15px;
    }
  </style>
</head>

<body>

<div class="header">
  <span onclick="history.back()">←</span>
  Fuel Converter
</div>

<div class="container">

  <!-- INPUT -->
  <div class="input-group">
    <input type="number" id="fuelInput" value="1" oninput="convertFuel()">
    <div class="unit-box">km/L</div>
  </div>

  <!-- RESULT TABLE -->
  <div class="table">
    <div class="table-header">Conversion Value</div>

    <div class="table-row"><span>Meter/Liter (m/L)</span><span id="ml"></span></div>
    <div class="table-row"><span>Kilometer/Liter (km/L)</span><span id="kml"></span></div>
    <div class="table-row"><span>Miles / US Gallon</span><span id="mpgUS"></span></div>
    <div class="table-row"><span>Miles / UK Gallon</span><span id="mpgUK"></span></div>
  </div>

</div>

<script>

  function convertFuel(){

    let value = parseFloat(document.getElementById("fuelInput").value);

    if(isNaN(value)){
      document.querySelectorAll(".table-row span:last-child")
      .forEach(e=>e.innerText="0");
      return;
    }

    // Base unit = km/L
    let kmPerL = value;

    // Conversions
    let meterPerL = kmPerL * 1000;
    let mpgUS = kmPerL * 2.35215;     // 1 km/L = 2.35215 mpg (US)
    let mpgUK = kmPerL * 2.82481;     // 1 km/L = 2.82481 mpg (UK)

    document.getElementById("ml").innerText = meterPerL.toFixed(3);
    document.getElementById("kml").innerText = kmPerL.toFixed(3);
    document.getElementById("mpgUS").innerText = mpgUS.toFixed(4);
    document.getElementById("mpgUK").innerText = mpgUK.toFixed(4);
  }

  convertFuel(); // load default

</script>

</body>
</html>
