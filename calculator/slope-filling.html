<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slope Filling</title>
  <link rel="stylesheet" href="../style.css" />
</head>

<body class="page-calculator slope-page">

  <!-- ===== TOP BAR ===== -->
  <header class="top-bar slope-header">
    <a class='back-btn' href='../index.html'>←</a>
    <h1>Slope Filling</h1>
    <span class="edit-icon">✏️</span>
  </header>

  <main class="slope-container">

    <!-- ===== TYPE CARD ===== -->
    <div class="calc-type-card">
      <img src="../icons/slope.html" alt="Slope Filling">
      <p>Slope Filling</p>
    </div>

    <!-- ===== DIMENSIONS ===== -->
    <div class="section-title">Dimensions of Embankment :</div>

    <div class="calc-form">

      <div class="input-row">
        <label>Bottom Width b1</label>
        <div class="input-wrap">
          <input type="number" value="5">
          <span>m</span>
        </div>
      </div>

      <div class="input-row">
        <label>Top Width b2</label>
        <div class="input-wrap">
          <input type="number" value="3">
          <span>m</span>
        </div>
      </div>

      <div class="input-row">
        <label>Length L</label>
        <div class="input-wrap">
          <input type="number" value="5">
          <span>m</span>
        </div>
      </div>

      <div class="input-row">
        <label>Depth d</label>
        <div class="input-wrap">
          <input type="number" value="5">
          <span>m</span>
        </div>
      </div>

    </div>

    <!-- ===== THICK DIVIDER ===== -->
    <div class="thick-divider"></div>

    <!-- ===== EXCAVATION DETAILS ===== -->
    <div class="section-title">Excavation Quantity and Trip Volume :</div>

    <div class="calc-form">

      <div class="dual-row">
        <div class="input-row">
          <label>1 Trip Volume</label>
          <div class="input-wrap">
            <input type="number" value="50">
            <span>m³</span>
          </div>
        </div>

        <div class="input-row">
          <label>Excavation Price</label>
          <div class="input-wrap">
            <input type="number" value="0">
            <span>per/m³</span>
          </div>
        </div>
      </div>

      <div class="input-row">
        <label>Quantity</label>
        <input type="number" value="1" class="full-input">
      </div>

    </div>

    <!-- ===== THICK DIVIDER ===== -->
    <div class="thick-divider"></div>

    <!-- ===== BUTTONS ===== -->
    <div class="action-buttons">
      <button class="btn ghost">📤 Share</button>
      <button class="btn primary">🧮 Calculate</button>
      <button class="btn ghost">🔄 Reset</button>
    </div>

    <!-- ===== YOUTUBE ===== -->
    <div class="yt-banner">
      Subscribe our Youtube Channel ▶
      <strong>Civil Engineering Tech</strong>
    </div>

    <!-- ===== LIGHT DIVIDER ===== -->
    <div class="light-divider"></div>

    <!-- ===== RESULT TABLE ===== -->
    <div class="result-table">

      <div class="result-header">
        <span>Material</span>
        <span>Quantity</span>
        <span>Unit</span>
      </div>

      <div class="result-row">
        <span>Volume</span>
        <span>100.000</span>
        <span>m³</span>
      </div>

      <div class="result-row">
        <span>Total Trips</span>
        <span>2.00</span>
        <span>trips</span>
      </div>

      <div class="result-row">
        <span>Total Cost</span>
        <span>0.00</span>
        <span>₹</span>
      </div>

    </div>

  </main>

</body>

</html>
