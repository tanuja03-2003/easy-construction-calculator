<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4 Bar Column Calculator</title>

  <style>
    :root{
     --dark:#0b2c6f;
     --blue:#123f9a;
    }

    body{
     font-family:Arial;
     margin:0;
     background:#eef2fa;
    }

    .header{
     background:var(--dark);
     color:white;
     padding:18px;
     text-align:center;
     font-size:22px;
     font-weight:bold;
    }

    .container{
     max-width:900px;
     margin:20px auto;
     background:white;
     padding:20px;
     border-radius:10px;
     box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    h3{
     color:var(--dark);
     border-bottom:2px solid var(--dark);
     padding-bottom:5px;
    }

    .input-row{
     display:flex;
     gap:10px;
     margin-bottom:10px;
     flex-wrap:wrap; /* prevents overflow */
    }

    input{
     flex:1;
     min-width:0; /* IMPORTANT FIX */
     padding:8px;
     border:1px solid #ccc;
     border-radius:5px;
     box-sizing:border-box; /* keeps width inside */
    }

    .unit-box{
     background:var(--blue);
     color:white;
     padding:8px;
     min-width:60px;
     text-align:center;
     border-radius:5px;
    }

    button{
     background:var(--dark);
     color:white;
     border:none;
     padding:8px 16px;
     border-radius:5px;
     cursor:pointer;
    }

    button:hover{
     background:var(--blue);
    }

    .table-section{
     margin-top:20px;
     border:1px solid #ccc;
     border-radius:8px;
     overflow:hidden;
    }

    .table-header{
     background:#e9eef9;
     padding:10px;
     font-weight:bold;
     display:flex;
    }

    .table-header div,
    .table-row div{
     flex:1;
     text-align:center;
    }

    .table-row{
     display:flex;
     padding:8px 10px;
     border-top:1px solid #eee;
    }

    .unit-switch{
     display:flex;
     justify-content:center;
     gap:10px;
     margin-top:20px;
     flex-wrap:wrap;
    }

    .unit-switch button{
     background:#ccc;
     color:black;
    }

    .unit-switch button.active{
     background:var(--dark);
     color:white;
    }
    .back-btn {
    color: white;
    font-size: 22px;
    text-decoration: none;
    margin-right: 15px;
}

    /* ✅ FIXED Concrete Ratio Layout */
    .ratio-row{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:10px;
      margin-bottom:10px;
    }

  </style>
</head>
<body>

<div class="header">
  <a href="rcc.html" class="back-btn">←</a>

  Calculation of 4 Bar Column</div>

<div class="container">

  <h3>Column Dimensions</h3>

  <div class="input-row">
    <input type="number" id="a" placeholder="Side (a)">
    <div class="unit-box" id="lengthUnit">m</div>
  </div>

  <div class="input-row">
    <input type="number" id="b" placeholder="Side (b)">
    <div class="unit-box">m</div>
  </div>

  <div class="input-row">
    <input type="number" id="h" placeholder="Height">
    <div class="unit-box">m</div>
  </div>

  <h3>Steel Details</h3>

  <div class="input-row">
    <input type="number" id="d1" value="12">
    <div class="unit-box">mm</div>
  </div>

  <div class="input-row">
    <input type="number" id="ring" value="8">
    <div class="unit-box">mm</div>
  </div>

  <div class="input-row">
    <input type="number" id="spacing" value="150">
    <div class="unit-box">mm</div>
  </div>

  <div class="input-row">
    <input type="number" id="cols" value="1">
    <div class="unit-box">nos</div>
  </div>

  <h3>Concrete Ratio</h3>

  <!-- ✅ Updated Layout -->
  <div class="ratio-row">
    <input type="number" id="cR" value="1" placeholder="Cement">
    <input type="number" id="sR" value="2" placeholder="Sand">
    <input type="number" id="aR" value="4" placeholder="Aggregate">
  </div>

  <div class="input-row">
    <input type="number" id="price" placeholder="Steel Price ₹/kg">
  </div>

  <button onclick="calculate()">Calculate</button>

  <!-- STEEL TABLE -->
  <div class="table-section" id="steelTable"></div>

  <!-- CONCRETE TABLE -->
  <div class="table-section" id="concreteTable"></div>

  <div class="unit-switch">
    <button onclick="setUnit(event,'m')" class="active">Meter</button>
    <button onclick="setUnit(event,'ft')">Foot</button>
    <button onclick="setUnit(event,'yd')">Yard</button>
    <button onclick="setUnit(event,'brass')">Brass</button>
  </div>

</div>

<script>

  let currentUnit="m";

  function setUnit(event,unit){
   currentUnit=unit;
   document.querySelectorAll(".unit-switch button").forEach(btn=>btn.classList.remove("active"));
   event.target.classList.add("active");
   calculate();
  }

  function lengthToMeter(val){
   if(currentUnit=="m") return val;
   if(currentUnit=="ft") return val*0.3048;
   if(currentUnit=="yd") return val*0.9144;
   if(currentUnit=="brass") return val;
  }

  function convertVolume(m3){
   if(currentUnit=="m") return [m3,"m³"];
   if(currentUnit=="ft") return [m3*35.3147,"ft³"];
   if(currentUnit=="yd") return [m3*1.30795,"yd³"];
   if(currentUnit=="brass") return [m3*35.3147/100,"brass"];
  }

  function convertWeight(kg){
   if(currentUnit=="m") return [kg,"kg"];
   if(currentUnit=="ft" || currentUnit=="yd") return [kg*2.20462,"lb"];
   if(currentUnit=="brass") return [kg,"kg"];
  }

  function calculate(){

   let a = lengthToMeter(parseFloat(document.getElementById("a").value)||0);
   let b = lengthToMeter(parseFloat(document.getElementById("b").value)||0);
   let h = lengthToMeter(parseFloat(document.getElementById("h").value)||0);

   let d1 = parseFloat(document.getElementById("d1").value)||0;
   let ring = parseFloat(document.getElementById("ring").value)||0;
   let spacing = parseFloat(document.getElementById("spacing").value)||0;
   let cols = parseFloat(document.getElementById("cols").value)||1;

   let cR = parseFloat(document.getElementById("cR").value)||1;
   let sR = parseFloat(document.getElementById("sR").value)||1;
   let aR = parseFloat(document.getElementById("aR").value)||1;
   let price = parseFloat(document.getElementById("price").value)||0;

   let volume = a*b*h*cols;
   let dry = volume*1.54;
   let totalRatio = cR+sR+aR;

   let cement = (dry*cR)/totalRatio;
   let sand = (dry*sR)/totalRatio;
   let agg = (dry*aR)/totalRatio;
   let bags = cement/0.035;

   let vertLength = h*4*cols;
   let vertWeight = (d1*d1/162)*vertLength;

   let stirrups = spacing>0 ? (h*1000)/spacing : 0;
   let stirrupLength = 2*(a+b);
   let stirrupWeight = (ring*ring/162)*stirrupLength*stirrups;

   let totalSteel = vertWeight+stirrupWeight;
   let cost = totalSteel*price;

   let [steelVal,steelUnit] = convertWeight(totalSteel);
   let [volVal,volUnit] = convertVolume(volume);

   document.getElementById("steelTable").innerHTML = `
   <div class="table-header"><div>Steel</div><div>Quantity</div><div>Unit</div></div>
   <div class="table-row"><div>Total Weight</div><div>${steelVal.toFixed(2)}</div><div>${steelUnit}</div></div>
   <div class="table-row"><div>Total Cost</div><div>${cost.toFixed(2)}</div><div>₹</div></div>
   `;

   document.getElementById("concreteTable").innerHTML = `
   <div class="table-header"><div>Concrete</div><div>Quantity</div><div>Unit</div></div>
   <div class="table-row"><div>Concrete Volume</div><div>${volVal.toFixed(3)}</div><div>${volUnit}</div></div>
   <div class="table-row"><div>Cement Bags (50kg)</div><div>${bags.toFixed(1)}</div><div>bags</div></div>
   `;
  }

  calculate();

</script>

</body>
</html>
