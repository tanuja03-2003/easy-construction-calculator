<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculation of Asphalt</title>
  <link rel="stylesheet" href="../style.css"/>
</head>

<body class="page-calculator asphalt-page">

  <!-- TOP BAR -->
  <header class="top-bar asphalt-header">
    <a class='back-btn' href='../index.html'>←</a>
    <h1>Calculation of Asphalt</h1>
    <span class="edit-icon">✏️</span>
  </header>

  <main class="asphalt-container">

    <!-- TYPE CARD -->
    <div class="asphalt-type-card">
      <img src="../icons/asphalt.html" alt="Asphalt"/>
      <p>Calculation of Asphalt</p>
    </div>

    <!-- DIMENSIONS -->
    <p class="section-title">Dimensions of Road :</p>

    <div class="input-row">
      <label>Length L</label>
      <div class="input-wrap">
        <input type="number" value="5"/>
        <span class="unit">m</span>
      </div>
    </div>

    <div class="input-row">
      <label>Width W</label>
      <div class="input-wrap">
        <input type="number" value="5"/>
        <span class="unit">m</span>
      </div>
    </div>

    <div class="input-row">
      <label>Thickness t</label>
      <div class="input-wrap">
        <input type="number" value="5"/>
        <span class="unit">cm</span>
      </div>
    </div>

    <div class="divider"></div>

    <!-- QUANTITY & PRICE -->
    <p class="section-title">Asphalt Quantity and Price :</p>

    <div class="two-col">
      <div class="input-row">
        <label>Quantity</label>
        <input type="number" value="1"/>
      </div>

      <div class="input-row">
        <label>Asphalt Price</label>
        <div class="input-wrap">
          <input type="number" value="0"/>
          <span class="unit">per ton</span>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- BUTTONS -->
    <div class="action-buttons">
      <button class="btn ghost">📤 Share</button>
      <button class="btn primary">🧮 Calculate</button>
      <button class="btn ghost">🔄 Reset</button>
    </div>

    <div class="divider light"></div>

    <!-- YOUTUBE -->
    <div class="yt-banner">
      Subscribe our Youtube Channel
      <strong>▶ Civil Engineering Tech</strong>
    </div>

    <div class="divider"></div>

    <!-- RESULT TABLE -->
    <div class="result-box">
      <div class="result-header">
        <span>Material</span>
        <span>Quantity</span>
        <span>Unit</span>
      </div>

      <div class="result-row">
        <span>Volume</span>
        <span>1.250</span>
        <span>m³</span>
      </div>

      <div class="result-row">
        <span>Asphalt</span>
        <span>2.90</span>
        <span>metric ton</span>
      </div>

      <div class="result-row">
        <span>Total Cost</span>
        <span>0.00</span>
        <span>₹</span>
      </div>
    </div>

  </main>

</body>

</html>
