<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculation of Bricks</title>
  <link rel="stylesheet" href="../style.css"/>
</head>

<body class="page-calculator floor-bricks-page">

  <!-- TOP BAR -->
  <header class="top-bar floor-bricks-header">
    <a class='back-btn' href='../index.html'>←</a>
    <h1>Calculation of Bricks</h1>
    <span class="edit-icon">✏️</span>
  </header>

  <main class="floor-bricks-container">

    <!-- TYPE CARD -->
    <div class="floor-bricks-type-card">
      <img src="../icons/bricks.html" alt="Bricks"/>
      <p>Calculation of Bricks</p>
    </div>

    <!-- DIMENSIONS -->
    <div class="two-col section-block">
      <div>
        <p class="section-title">Dimensions of Floor :</p>

        <div class="input-row">
          <label>Length L</label>
          <div class="input-wrap">
            <input type="number" value="5">
            <span class="unit">m</span>
          </div>
        </div>

        <div class="input-row">
          <label>Width W</label>
          <div class="input-wrap">
            <input type="number" value="5">
            <span class="unit">m</span>
          </div>
        </div>
      </div>

      <div>
        <p class="section-title">Dimensions of Brick :</p>

        <div class="input-row">
          <label>Length L</label>
          <div class="input-wrap">
            <input type="number" value="5">
            <span class="unit">cm</span>
          </div>
        </div>

        <div class="input-row">
          <label>Width W</label>
          <div class="input-wrap">
            <input type="number" value="5">
            <span class="unit">cm</span>
          </div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- WASTAGE -->
    <p class="section-title">Wastage and Quantity :</p>

    <div class="two-col">
      <div class="input-row">
        <label>Wastage %</label>
        <input type="number" value="5">
      </div>

      <div class="input-row">
        <label>Quantity</label>
        <input type="number" value="1">
      </div>
    </div>

    <div class="input-row">
      <label>Bricks Price</label>
      <div class="input-wrap">
        <input type="number" value="0">
        <span class="unit">per/m²</span>
      </div>
    </div>

    <div class="divider"></div>

    <!-- BUTTONS -->
    <div class="action-buttons">
      <button class="btn ghost">📤 Share</button>
      <button class="btn primary">🧮 Calculate</button>
      <button class="btn ghost">🔄 Reset</button>
    </div>

    <div class="divider light"></div>

    <!-- YOUTUBE -->
    <div class="yt-banner">
      Subscribe our Youtube Channel
      <strong>▶ Civil Engineering Tech</strong>
    </div>

    <div class="divider"></div>

    <!-- RESULTS -->
    <div class="result-box">
      <div class="result-header">
        <span>Material</span>
        <span>Quantity</span>
        <span>Unit</span>
      </div>

      <div class="result-row">
        <span>Floor Area</span>
        <span>25.000</span>
        <span>m²</span>
      </div>

      <div class="result-row">
        <span>Number of Tile</span>
        <span>10500.00</span>
        <span>Tiles</span>
      </div>

      <div class="result-row">
        <span>Tile Cost</span>
        <span>0.00</span>
        <span>₹</span>
      </div>
    </div>

  </main>

</body>
