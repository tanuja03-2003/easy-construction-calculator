<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ellipse Area</title>

  <style>
    :root{
      --dark:#0b2c6f;
      --light:#eef2f8;
    }

    body{
      margin:0;
      font-family:Arial;
      background:#e6ecf5;
    }

    /* Header */
    .header{
      background:var(--dark);
      color:white;
      padding:15px;
      display:flex;
      align-items:center;
      gap:10px;
    }

    .header a{
      color:white;
      text-decoration:none;
      font-size:20px;
    }

    .container{
      max-width:450px;
      margin:20px auto;
      background:white;
      padding:20px;
      border-radius:12px;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    .title-box{
      border:3px solid var(--dark);
      border-radius:12px;
      padding:20px;
      display:flex;
      align-items:center;
      gap:20px;
      margin-bottom:20px;
    }

    .ellipse-shape{
      width:80px;
      height:50px;
      background:#5dade2;
      border-radius:50%;
      border:3px solid var(--dark);
    }

    h3{
      color:var(--dark);
    }

    .input-row{
      display:flex;
      gap:10px;
      margin-bottom:15px;
    }

    .input-row input{
      flex:1;
      padding:10px;
      border-radius:8px;
      border:2px solid var(--dark);
      box-sizing:border-box;
    }

    .unit-box{
      background:var(--dark);
      color:white;
      padding:10px;
      border-radius:8px;
      min-width:60px;
      text-align:center;
    }

    .buttons{
      display:flex;
      gap:10px;
      margin-top:10px;
    }

    button{
      flex:1;
      padding:10px;
      border:none;
      border-radius:20px;
      background:var(--dark);
      color:white;
      cursor:pointer;
    }

    button:hover{
      opacity:0.9;
    }

    /* Result Table */
    .table{
      margin-top:20px;
      border:1px solid #ccc;
      border-radius:8px;
      overflow:hidden;
    }

    .table-header, .table-row{
      display:flex;
    }

    .table-header{
      background:var(--dark);
      color:white;
      font-weight:bold;
    }

    .table-header div,
    .table-row div{
      flex:1;
      padding:10px;
      text-align:center;
      border-bottom:1px solid #eee;
    }

    /* Unit Switcher */
    .unit-switch{
      display:flex;
      justify-content:center;
      gap:10px;
      margin-top:15px;
    }

    .unit-switch button{
      background:#ccc;
      color:black;
      border-radius:6px;
      padding:6px 12px;
    }

    .unit-switch .active{
      background:var(--dark);
      color:white;
    }
  </style>
</head>
<body>

<div class="header">
  <a href="area.html">←</a>
  <h2>Ellipse Area</h2>
</div>

<div class="container">

  <div class="title-box">
    <div class="ellipse-shape"></div>
    <h3>Calculation of Ellipse Area</h3>
  </div>

  <label>Major Radius (R)</label>
  <div class="input-row">
    <input type="number" id="R" value="5">
    <div class="unit-box">m</div>
  </div>

  <label>Minor Radius (r)</label>
  <div class="input-row">
    <input type="number" id="r" value="5">
    <div class="unit-box">m</div>
  </div>

  <div class="buttons">
    <button onclick="calculate()">Calculate</button>
    <button onclick="resetAll()">Reset</button>
  </div>

  <div class="table" id="resultTable"></div>

  <div class="unit-switch">
    <button onclick="setUnit(event,'m')" class="active">meter</button>
    <button onclick="setUnit(event,'ft')">foot</button>
    <button onclick="setUnit(event,'yd')">yard</button>
    <button onclick="setUnit(event,'brass')">brass</button>
  </div>

</div>

<script>
  let currentUnit="m";

  function setUnit(e,unit){
    currentUnit=unit;
    document.querySelectorAll(".unit-switch button").forEach(btn=>btn.classList.remove("active"));
    e.target.classList.add("active");
    calculate();
  }

  function convertLength(val){
    if(currentUnit=="m") return val;
    if(currentUnit=="ft") return val*3.28084;
    if(currentUnit=="yd") return val*1.09361;
    return val;
  }

  function convertArea(val){
    if(currentUnit=="m") return [val,"m²"];
    if(currentUnit=="ft") return [val*10.7639,"ft²"];
    if(currentUnit=="yd") return [val*1.19599,"yd²"];
    if(currentUnit=="brass") return [val/2.83,"brass"];
  }

  function calculate(){
    let R=parseFloat(document.getElementById("R").value)||0;
    let r=parseFloat(document.getElementById("r").value)||0;

    let area=Math.PI*R*r;

    // Ramanujan approximation for ellipse perimeter
    let perimeter=Math.PI*(3*(R+r)-Math.sqrt((3*R+r)*(R+3*r)));

    let [areaVal,areaUnit]=convertArea(area);

    let perVal=convertLength(perimeter);
    let perUnit=currentUnit=="m"?"meter":currentUnit;

    document.getElementById("resultTable").innerHTML=`
      <div class="table-header">
        <div>Material</div><div>Quantity</div><div>Unit</div>
      </div>
      <div class="table-row">
        <div>Area</div><div>${areaVal.toFixed(3)}</div><div>${areaUnit}</div>
      </div>
      <div class="table-row">
        <div>Perimeter</div><div>${perVal.toFixed(3)}</div><div>${perUnit}</div>
      </div>
    `;
  }

  function resetAll(){
    document.getElementById("R").value=0;
    document.getElementById("r").value=0;
    document.getElementById("resultTable").innerHTML="";
  }

  calculate();
</script>

</body>
</html>
